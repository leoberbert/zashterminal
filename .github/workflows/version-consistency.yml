name: Version Consistency

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Verify version alignment
        run: |
          python3 scripts/sync_version.py --check
