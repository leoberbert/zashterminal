name: Publish AUR

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aur-publish
  cancel-in-progress: false

jobs:
  aur:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version from app config
        id: version
        run: |
          PKGVER=$(python3 scripts/sync_version.py --print-current)
          echo "pkgver=$PKGVER" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD pkgver
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.pkgver }}/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD:/repo" -w /repo archlinux:base-devel \
            bash -c "makepkg --printsrcinfo > .SRCINFO"

      - name: Publish to AUR
        run: |
          test -n "${{ secrets.AUR_SSH_KEY }}" || { echo "AUR_SSH_KEY secret is empty"; exit 1; }

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts || true

          KEY_FILE="${RUNNER_TEMP}/aur_ssh_key"
          printf '%s\n' "${{ secrets.AUR_SSH_KEY }}" | tr -d '\r' > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"
          ssh-keygen -lf "${KEY_FILE}"

          export GIT_SSH_COMMAND="ssh -i ${KEY_FILE} -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -o ConnectionAttempts=8 -o ServerAliveInterval=20 -o ServerAliveCountMax=6 -o TCPKeepAlive=yes -o IPQoS=throughput"

          retry() {
            local max_attempts="$1"
            shift
            local attempt=1
            until "$@"; do
              if [ "${attempt}" -ge "${max_attempts}" ]; then
                echo "Command failed after ${attempt} attempts: $*"
                return 1
              fi
              echo "Attempt ${attempt}/${max_attempts} failed. Retrying in 5s..."
              attempt=$((attempt + 1))
              sleep 5
            done
          }

          retry 5 git ls-remote ssh://aur@aur.archlinux.org/zashterminal.git HEAD >/dev/null || {
            echo "AUR git auth failed (ls-remote)";
            exit 1;
          }
          retry 4 git clone --depth 1 ssh://aur@aur.archlinux.org/zashterminal.git aur-repo
          cp PKGBUILD .SRCINFO aur-repo/
          cd aur-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.version.outputs.pkgver }}"
          retry 6 bash -lc "git pull --rebase origin master || true; git push origin HEAD:master"
