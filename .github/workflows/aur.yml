name: Publish AUR

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  aur:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version from app config
        id: version
        run: |
          # Usando Python para extrair a versão de forma robusta
          PKGVER=$(python3 -c "
          import re
          import os

          target = 'src/zashterminal/settings/config.py'
          if not os.path.exists(target):
              import sys; sys.exit(f'Erro: Arquivo {target} nao encontrado na raiz')

          with open(target, 'r', encoding='utf-8') as f:
              content = f.read()
          # Regex simplificada que aceita aspas simples ou duplas
          match = re.search(r'APP_VERSION\\s*=\\s*[\\\"\\']([^\\\"\\']+)[\\\"\\']', content)
          if match:
              print(match.group(1))
          else:
              import sys; sys.exit('Erro: Variavel APP_VERSION nao encontrada dentro do arquivo')
          ")
          echo "pkgver=$PKGVER" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD pkgver
        run: |
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.pkgver }}/" PKGBUILD

      - name: Generate .SRCINFO
        run: |
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD:/repo" -w /repo archlinux:base-devel \
            bash -c "makepkg --printsrcinfo > .SRCINFO"

      - name: Start ssh-agent
        run: |
          test -n "${{ secrets.AUR_SSH_KEY }}" || { echo "AUR_SSH_KEY secret is empty"; exit 1; }
          eval "$(ssh-agent -s)"
          printf '%s\n' "${{ secrets.AUR_SSH_KEY }}" | tr -d '\r' | ssh-add -
          ssh-add -l
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Best effort known_hosts prefill; do not fail workflow if keyscan is flaky.
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 600 ~/.ssh/known_hosts || true
          {
            echo "Host aur.archlinux.org"
            echo "  HostName aur.archlinux.org"
            echo "  User aur"
            echo "  IdentitiesOnly yes"
            echo "  StrictHostKeyChecking accept-new"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
          } >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Publish to AUR
        run: |
          export GIT_SSH_COMMAND='ssh -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new'
          ssh -T aur@aur.archlinux.org || { echo "AUR SSH auth failed"; exit 1; }
          git clone ssh://aur@aur.archlinux.org/zashterminal.git aur-repo
          cp PKGBUILD .SRCINFO aur-repo/
          cd aur-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git add PKGBUILD .SRCINFO
          git commit -m "Update to ${{ steps.version.outputs.pkgver }}"
          git push
